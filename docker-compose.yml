version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - HACKATHON_TEST_PHONE=${HACKATHON_TEST_PHONE}
    depends_on:
      - redis
      - qdrant
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - HACKATHON_TEST_PHONE=${HACKATHON_TEST_PHONE}
    depends_on:
      - redis
      - qdrant
      - api
    command: ["celery", "-A", "celery_worker", "worker", "--loglevel=info"]

  web:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  redis_data:
  qdrant_data:
